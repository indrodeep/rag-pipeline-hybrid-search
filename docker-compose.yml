# One command to run the whole app:  docker compose up
#
# Starts both services together:
#   - backend  (FastAPI + uvicorn)  → http://localhost:8000  (docs at /docs)
#   - frontend (Vite dev server)    → http://localhost:5173
#
# The browser loads the frontend from :5173 and calls the backend at :8000
# directly (both ports are published to the host), so CORS works unchanged.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # supplies OPENAI_API_KEY
    volumes:
      # Persist indexes, uploads, logs, and the seed corpus across restarts.
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
